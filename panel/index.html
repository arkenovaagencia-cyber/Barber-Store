<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Jeurisito Supply</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .panel-wrap{ max-width:1000px; margin:0 auto; padding:100px 24px 60px; }
  .panel-login{ max-width:420px; margin:120px auto; padding:24px; }
  .stat-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin:24px 0 36px; }
  .stat-card{ background:var(--steel); border:1px solid var(--line); border-radius:var(--radius); padding:20px; }
  .stat-card .num{ font-family:var(--display); font-size:2.2rem; color:var(--blue); }
  .stat-card .label{ font-family:var(--mono); font-size:0.8rem; color:var(--bone-dim); text-transform:uppercase; }
  .panel-tabs{ display:flex; gap:8px; margin-bottom:20px; }
  .panel-tab{ padding:10px 18px; border-radius:100px; border:1px solid var(--line); font-family:var(--mono); font-size:0.85rem; cursor:pointer; background:transparent; }
  .panel-tab.active{ background:var(--blue); color:#fff; border-color:var(--blue); }
  .order-row{ background:var(--steel); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:10px; padding:16px 18px; cursor:pointer; }
  .order-row-top{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  .order-status{ font-family:var(--mono); font-size:0.72rem; padding:4px 10px; border-radius:100px; background:var(--blue-light); color:#fff; }
  .order-status.entrega{ background:var(--bone-dim); }
  .order-details{ display:none; margin-top:14px; padding-top:14px; border-top:1px solid var(--line); font-size:0.92rem; line-height:1.8; }
  .order-row.open .order-details{ display:block; }
  .customer-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line); }
  #logoutPanelBtn{ position:fixed; top:16px; right:16px; z-index:10; }
</style>
</head>
<body>

<div id="loginView" class="panel-login">
  <p class="section-eyebrow">Acceso privado</p>
  <h1 class="section-title">Panel <span class="accent">admin</span></h1>
  <div class="pay-options" style="margin-top:20px;">
    <div class="agenda-form checkout-form">
      <div class="field">
        <label for="panelEmail">Correo</label>
        <input type="email" id="panelEmail" placeholder="tu@correo.com">
      </div>
      <div class="field">
        <label for="panelPassword">Contraseña</label>
        <input type="password" id="panelPassword" placeholder="••••••••">
      </div>
    </div>
    <p id="panelError" style="color:var(--red-bright); display:none; margin-top:8px;"></p>
    <button class="btn btn-primary btn-block" id="panelLoginBtn" style="margin-top:16px;">Entrar</button>
  </div>
</div>

<div id="dashboardView" style="display:none;">
  <button class="btn btn-ghost btn-sm" id="logoutPanelBtn">Cerrar sesión</button>
  <div class="panel-wrap">
    <p class="section-eyebrow">Jeurisito Supply</p>
    <h1 class="section-title">Panel de <span class="accent">control</span></h1>

    <div class="stat-cards">
      <div class="stat-card"><div class="num" id="statOrders">0</div><div class="label">Pedidos totales</div></div>
      <div class="stat-card"><div class="num" id="statCustomers">0</div><div class="label">Clientes registrados</div></div>
      <div class="stat-card"><div class="num" id="statStockRequests">0</div><div class="label">Avisos de stock pedidos</div></div>
    </div>

    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="pedidos">Pedidos</button>
      <button class="panel-tab" data-tab="clientes">Clientes</button>
    </div>

    <div id="tabPedidos">
      <div id="ordersList">Cargando pedidos...</div>
    </div>

    <div id="tabClientes" style="display:none;">
      <div id="customersList">Cargando clientes...</div>
    </div>
  </div>
</div>

<script src="../js/supabase-config.js"></script>
<script src="panel.js"></script>
</body>
</html>
