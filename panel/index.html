<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Jeurisito Supply</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #000000;
    --cyan: #34f2ff;
    --cyan-soft: rgba(52,242,255,0.25);
    --gold: #ffb020;
    --text-dim: #6f9aa6;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:
      radial-gradient(ellipse at 50% -10%, rgba(52,242,255,0.08), transparent 55%),
      radial-gradient(circle at 90% 10%, rgba(52,242,255,0.05), transparent 40%),
      var(--bg);
    color:#eafcff;
    font-family:'Space Mono', monospace;
    padding: 50px 24px 70px;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none;
    background-image: linear-gradient(rgba(52,242,255,0.035) 1px, transparent 1px),
                       linear-gradient(90deg, rgba(52,242,255,0.035) 1px, transparent 1px);
    background-size: 42px 42px;
  }

  .wrap{ max-width:1180px; margin:0 auto; position:relative; }

  .panel-login{ max-width:420px; margin:100px auto 0; text-align:center; }
  .panel-login h1{ margin-bottom:24px; }
  .agenda-form{ text-align:left; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:0.65rem; letter-spacing:2px; color:var(--text-dim); margin-bottom:6px; }
  .field input{
    width:100%; padding:12px 14px; background:rgba(52,242,255,0.04); border:1px solid var(--cyan-soft);
    border-radius:6px; color:#eafcff; font-family:'Space Mono', monospace; font-size:0.9rem;
  }
  .field input:focus{ outline:none; border-color:var(--cyan); }
  .btn-holo{
    width:100%; padding:13px; background:var(--cyan); color:#001217; border:none; border-radius:6px;
    font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:2px; font-size:0.75rem;
    box-shadow:0 0 18px rgba(52,242,255,0.4); cursor:pointer; margin-top:6px;
  }
  .error-msg{ color:#ff6b6b; font-size:0.78rem; margin-top:10px; }

  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:36px; }
  .id-block{ display:flex; align-items:center; gap:16px; }
  .ring-badge{ width:44px; height:44px; }
  .ring-badge svg{ width:100%; height:100%; animation: spin 6s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .eyebrow{ font-size:0.62rem; letter-spacing:3px; color:var(--text-dim); }
  .brand{ font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:3px; font-size:0.9rem; color:var(--cyan); text-shadow:0 0 12px rgba(52,242,255,0.5); }
  .logout{ font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:2px; color:var(--cyan); border:1px solid var(--cyan-soft); padding:9px 18px; border-radius:100px; background:rgba(52,242,255,0.03); cursor:pointer; }

  h1{ font-family:'Orbitron',sans-serif; font-weight:900; font-size:2.4rem; letter-spacing:2px; color:#fff; text-shadow:0 0 22px rgba(52,242,255,0.55); margin-bottom:4px; }
  h1 span{ color:var(--cyan); }
  .sub{ font-size:0.72rem; letter-spacing:2px; color:var(--text-dim); margin-bottom:20px; }

  .stats-row{ display:flex; gap:28px; align-items:flex-start; margin-bottom:48px; flex-wrap:wrap; }

  .rings{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; flex:1; min-width:320px; }
  .ring-card{ display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:10px 8px 0; position:relative; }

  .mini-funnel{
    position:absolute; bottom:38px; width:130px; height:130px;
    background: conic-gradient(from 250deg at 50% 0%, transparent 0deg, rgba(52,242,255,0.22) 35deg, transparent 70deg);
    clip-path: polygon(50% 100%, 12% 0%, 88% 0%);
    opacity:0.8; animation: funnelpulse 2.2s ease-in-out infinite;
  }
  .mini-funnel.gold{ background: conic-gradient(from 250deg at 50% 0%, transparent 0deg, rgba(255,176,32,0.22) 35deg, transparent 70deg); }
  @keyframes funnelpulse{ 0%,100%{ opacity:0.5; } 50%{ opacity:0.9; } }

  .mini-led{
    position:relative; z-index:3; width:90px; height:7px; border-radius:50%;
    border:1px solid var(--cyan); box-shadow:0 0 16px 3px rgba(52,242,255,0.6), inset 0 0 10px rgba(52,242,255,0.5);
    background: radial-gradient(ellipse at center, rgba(52,242,255,0.3), transparent 70%);
    margin-top:14px;
  }
  .mini-led.gold{ border-color:var(--gold); box-shadow:0 0 16px 3px rgba(255,176,32,0.6), inset 0 0 10px rgba(255,176,32,0.5); background: radial-gradient(ellipse at center, rgba(255,176,32,0.3), transparent 70%); }
  .mini-led::before{
    content:""; position:absolute; top:50%; left:50%; width:118px; height:7px; border-radius:50%;
    border:1px solid rgba(52,242,255,0.4); transform:translate(-50%,-50%); animation:ringspin 5s linear infinite;
  }
  .mini-led.gold::before{ border-color:rgba(255,176,32,0.4); }
  @keyframes ringspin{ to{ transform:translate(-50%,-50%) rotate(360deg); } }

  .gauge{ position:relative; width:104px; height:104px; z-index:2; animation: holofloat 4s ease-in-out infinite; }
  @keyframes holofloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
  .gauge svg.static-ring{ position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); }
  .gauge-track{ fill:none; stroke:rgba(52,242,255,0.12); stroke-width:6; }
  .gauge-fill{ fill:none; stroke:var(--cyan); stroke-width:6; stroke-linecap:round; filter:drop-shadow(0 0 6px rgba(52,242,255,0.8)); transition: stroke-dashoffset 1s ease; }
  .gauge-fill.gold{ stroke:var(--gold); filter:drop-shadow(0 0 6px rgba(255,176,32,0.8)); }
  .gauge svg.sweep{ position:absolute; inset:0; width:100%; height:100%; animation: sweepspin 2.6s linear infinite; }
  @keyframes sweepspin{ to{ transform:rotate(360deg); } }
  .gauge-center{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .gauge-num{ font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:700; color:#fff; text-shadow:0 0 10px rgba(52,242,255,0.7); }
  .ring-label{ font-size:0.6rem; letter-spacing:1.5px; color:var(--text-dim); text-align:center; margin-top:14px; }

  .holo-corner{ width:190px; display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
  .holo-stage{ position:relative; height:190px; width:100%; display:flex; align-items:flex-end; justify-content:center; }
  .holo-funnel{
    position:absolute; bottom:26px; width:150px; height:150px;
    background: conic-gradient(from 250deg at 50% 0%, transparent 0deg, rgba(52,242,255,0.28) 35deg, transparent 70deg);
    clip-path: polygon(50% 100%, 8% 0%, 92% 0%);
    opacity:0.85; animation: funnelpulse 2.2s ease-in-out infinite;
  }
  .holo-base{
    position:absolute; bottom:16px; width:110px; height:9px; border-radius:50%;
    border:1px solid var(--cyan); box-shadow:0 0 18px 3px rgba(52,242,255,0.6), inset 0 0 12px rgba(52,242,255,0.5);
    background: radial-gradient(ellipse at center, rgba(52,242,255,0.3), transparent 70%);
  }
  .holo-base::before{
    content:""; position:absolute; top:50%; left:50%; width:150px; height:9px; border-radius:50%;
    border:1px solid rgba(52,242,255,0.45); transform:translate(-50%,-50%); animation:ringspin 5s linear infinite;
  }
  .holo-product{ position:relative; width:110px; z-index:2; animation: holofloatp 4s ease-in-out infinite; }
  @keyframes holofloatp{ 0%,100%{ transform:translateY(0) rotate(-1deg); } 50%{ transform:translateY(-10px) rotate(1deg); } }
  .holo-product img{
    width:100%; display:block;
    filter: brightness(1.35) saturate(0) sepia(1) hue-rotate(150deg) saturate(6) contrast(1.15)
            drop-shadow(0 0 10px rgba(52,242,255,0.85)) drop-shadow(0 0 22px rgba(52,242,255,0.35));
    mix-blend-mode: screen;
  }
  .holo-scanline{
    position:absolute; left:4%; right:4%; height:1.5px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
    animation: holoscan 2.6s linear infinite; mix-blend-mode: screen;
  }
  @keyframes holoscan{ 0%{ top:6%; opacity:0; } 10%{ opacity:0.9; } 90%{ opacity:0.9; } 100%{ top:94%; opacity:0; } }
  .holo-tag{ margin-top:10px; font-size:0.56rem; letter-spacing:2px; color:var(--text-dim); text-align:center; }

  .tabs{ display:flex; gap:0; margin-bottom:24px; border-bottom:1px solid rgba(52,242,255,0.14); }
  .tab{ font-family:'Orbitron',sans-serif; font-size:0.68rem; letter-spacing:2px; color:var(--text-dim); padding:12px 26px; position:relative; background:none; border:none; cursor:pointer; }
  .tab.active{ color:var(--cyan); }
  .tab.active::after{ content:""; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }

  .order{
    display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap;
    padding:16px 22px; margin-bottom:10px; border-radius:10px; border:1px solid rgba(52,242,255,0.12);
    background: linear-gradient(90deg, rgba(52,242,255,0.05), transparent 60%);
  }
  .order-id{ font-size:0.6rem; color:var(--text-dim); letter-spacing:1px; }
  .order-name{ font-family:'Orbitron',sans-serif; font-size:0.85rem; color:#fff; letter-spacing:0.5px; }
  .order-meta{ font-size:0.68rem; color:var(--text-dim); margin-top:3px; }
  .badge{ font-size:0.6rem; letter-spacing:1.5px; padding:6px 14px; border-radius:100px; border:1px solid var(--gold); color:var(--gold); background:rgba(255,176,32,0.08); white-space:nowrap; }
  .badge.paid{ border-color:var(--cyan); color:var(--cyan); background:rgba(52,242,255,0.08); }

  .customer-row{ display:flex; justify-content:space-between; padding:12px 18px; border-bottom:1px solid rgba(52,242,255,0.1); font-size:0.82rem; }

  @media (max-width:820px){ .stats-row{ flex-direction:column; align-items:center; } }
</style>
</head>
<body>

<div id="loginView" class="wrap panel-login">
  <div class="eyebrow">ACCESO PRIVADO — J.A.R.V.I.S. MODE</div>
  <h1>PANEL <span>ADMIN</span></h1>
  <div class="agenda-form">
    <div class="field">
      <label>CORREO</label>
      <input type="email" id="panelEmail" placeholder="tu@correo.com">
    </div>
    <div class="field">
      <label>CONTRASEÑA</label>
      <input type="password" id="panelPassword" placeholder="••••••••">
    </div>
  </div>
  <p id="panelError" class="error-msg" style="display:none;"></p>
  <button class="btn-holo" id="panelLoginBtn">ENTRAR</button>
</div>

<div id="dashboardView" class="wrap" style="display:none;">
  <div class="topbar">
    <div class="id-block">
      <div class="ring-badge">
        <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="#34f2ff" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.7"/><circle cx="22" cy="22" r="10" fill="none" stroke="#ffb020" stroke-width="1.2" stroke-dasharray="4 4"/></svg>
      </div>
      <div>
        <div class="eyebrow">SISTEMA ACTIVO — ACCESO NIVEL 1</div>
        <div class="brand">JEURISITO SUPPLY</div>
      </div>
    </div>
    <button class="logout" id="logoutPanelBtn">CERRAR SESIÓN</button>
  </div>

  <div class="sub">// PANEL DE CONTROL</div>
  <h1>PANEL DE <span>CONTROL</span></h1>

  <div class="stats-row">
    <div class="rings">
      <div class="ring-card">
        <div class="mini-funnel"></div>
        <div class="gauge">
          <svg class="static-ring" viewBox="0 0 120 120">
            <circle class="gauge-track" cx="60" cy="60" r="52"/>
            <circle class="gauge-fill" id="fillOrders" cx="60" cy="60" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
          </svg>
          <svg class="sweep" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="52" fill="none" stroke="url(#g1)" stroke-width="3" stroke-dasharray="20 306.7" stroke-linecap="round"/>
            <defs><linearGradient id="g1"><stop offset="0%" stop-color="#34f2ff" stop-opacity="0"/><stop offset="100%" stop-color="#34f2ff" stop-opacity="1"/></linearGradient></defs>
          </svg>
          <div class="gauge-center"><div class="gauge-num" id="statOrders">0</div></div>
        </div>
        <div class="mini-led"></div>
        <div class="ring-label">PEDIDOS TOTALES</div>
      </div>

      <div class="ring-card">
        <div class="mini-funnel"></div>
        <div class="gauge">
          <svg class="static-ring" viewBox="0 0 120 120">
            <circle class="gauge-track" cx="60" cy="60" r="52"/>
            <circle class="gauge-fill" id="fillCustomers" cx="60" cy="60" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
          </svg>
          <svg class="sweep" viewBox="0 0 120 120" style="animation-duration:3.4s; animation-direction:reverse;">
            <circle cx="60" cy="60" r="52" fill="none" stroke="url(#g2)" stroke-width="3" stroke-dasharray="20 306.7" stroke-linecap="round"/>
            <defs><linearGradient id="g2"><stop offset="0%" stop-color="#34f2ff" stop-opacity="0"/><stop offset="100%" stop-color="#34f2ff" stop-opacity="1"/></linearGradient></defs>
          </svg>
          <div class="gauge-center"><div class="gauge-num" id="statCustomers">0</div></div>
        </div>
        <div class="mini-led"></div>
        <div class="ring-label">CLIENTES REGISTRADOS</div>
      </div>

      <div class="ring-card">
        <div class="mini-funnel gold"></div>
        <div class="gauge">
          <svg class="static-ring" viewBox="0 0 120 120">
            <circle class="gauge-track" cx="60" cy="60" r="52"/>
            <circle class="gauge-fill gold" id="fillStock" cx="60" cy="60" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
          </svg>
          <svg class="sweep" viewBox="0 0 120 120" style="animation-duration:2.1s;">
            <circle cx="60" cy="60" r="52" fill="none" stroke="url(#g3)" stroke-width="3" stroke-dasharray="20 306.7" stroke-linecap="round"/>
            <defs><linearGradient id="g3"><stop offset="0%" stop-color="#ffb020" stop-opacity="0"/><stop offset="100%" stop-color="#ffb020" stop-opacity="1"/></linearGradient></defs>
          </svg>
          <div class="gauge-center"><div class="gauge-num" id="statStockRequests">0</div></div>
        </div>
        <div class="mini-led gold"></div>
        <div class="ring-label">SOLICITUDES DE<br>REABASTECIMIENTO</div>
      </div>
    </div>

    <div class="holo-corner">
      <div class="holo-stage">
        <div class="holo-funnel"></div>
        <div class="holo-product">
          <div class="holo-scanline"></div>
          <img src="../assets/products/clipper-hologram.png" alt="Producto">
        </div>
        <div class="holo-base"></div>
      </div>
      <div class="holo-tag">// PROYECCIÓN ACTIVA</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="pedidos">PEDIDOS</button>
    <button class="tab" data-tab="clientes">CLIENTES</button>
  </div>

  <div id="tabPedidos">
    <div id="ordersList">Cargando pedidos...</div>
  </div>
  <div id="tabClientes" style="display:none;">
    <div id="customersList">Cargando clientes...</div>
  </div>
</div>

<script src="../js/supabase-config.js"></script>
<script src="panel.js"></script>
</body>
</html>
